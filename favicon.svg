<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="48" fill="url(#glow)"/>
  <!-- Main circle -->
  <circle cx="50" cy="50" r="42" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Inner shine -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.6"/>
  <!-- R letter -->
  <text x="50" y="67" font-family="Georgia, serif" font-size="54" font-weight="bold"
    fill="white" text-anchor="middle" opacity="0.97"
    style="filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3))">R</text>
</svg>
